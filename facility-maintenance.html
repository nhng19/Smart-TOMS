<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스마트 시설물 유지관리 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --ink:#1B2430; --brand:#1D4E89; --brand2:#2563EB;
    --paper:#F3F5F8; --panel:#FFFFFF; --slate:#6B7686; --line:#E2E5EA;
    --ok:#2E9E5B; --warn:#F0A202; --bad:#D64541; --video:#E23E32;
    --flowbg:#FFF7E0; --flownum:#F0A202;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','IBM Plex Sans KR',sans-serif;}
  #app{max-width:480px; margin:0 auto; min-height:100vh; background:var(--paper);
    display:flex; flex-direction:column;}
 
  header.topbar{
    position:relative; background:var(--brand); color:#fff;
    padding:18px 46px; text-align:center;
  }
  header.topbar .back{position:absolute; left:14px; top:50%; transform:translateY(-50%);
    background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:6px;}
  header.topbar .topbar-right{position:absolute; right:14px; top:50%; transform:translateY(-50%);}
  header.topbar .topbar-right button{background:rgba(255,255,255,.15); border:none; color:#fff;
    border-radius:8px; padding:6px 10px; font-size:13px; cursor:pointer;}
  header.topbar .eyebrow{font-size:12px; color:#CBDBF2; margin-bottom:2px;}
  header.topbar .title{font-size:17px; font-weight:700;}
 
  main{flex:1; padding:18px; padding-bottom:88px;}
 
  .card{background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:16px; margin-bottom:12px;}
  .card h3{margin:0 0 4px; font-size:16px;}
  .card p{margin:0; color:var(--slate); font-size:13.5px;}
  .card.tap{cursor:pointer; display:flex; align-items:center; gap:12px;}
  .card.tap:active{background:#F0F2F5;}
  .card.tap .ic{font-size:22px; flex:none;}
  .card.tap .chev{margin-left:auto; color:var(--slate); font-size:18px;}
 
  .qr-promo{background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:24px 18px; text-align:center; margin-bottom:20px;}
  .qr-promo .glyph{font-size:30px; margin-bottom:8px;}
  .qr-promo p{color:var(--slate); font-size:13.5px; margin:0 0 14px;}
 
  .btn-primary{
    display:block; width:100%; padding:13px; border:none; border-radius:9px;
    background:var(--brand2); color:#fff; font-size:14.5px; font-weight:700; cursor:pointer;
  }
  .btn-primary:active{opacity:.85;}
  .btn-video{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:13px; border:none; border-radius:9px; text-decoration:none;
    background:var(--video); color:#fff; font-size:14.5px; font-weight:700; cursor:pointer; margin-top:6px;
  }
  .btn-secondary{
    display:block; width:100%; padding:12px; border:1px solid var(--line); border-radius:9px;
    background:#fff; color:var(--ink); font-size:14px; font-weight:600; cursor:pointer; margin-top:10px;
  }
  .btn-ghost-sm{background:rgba(255,255,255,.15); border:none; color:#fff; border-radius:8px;
    padding:6px 12px; font-size:12.5px; cursor:pointer;}
 
  .section-label{font-size:13px; font-weight:700; color:var(--slate); margin:20px 0 8px;}
 
  input[type=text], textarea, select{
    width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px;
    font-size:14.5px; font-family:inherit; margin-bottom:12px; background:#fff; color:var(--ink);
  }
  textarea{min-height:80px; resize:vertical;}
  select{appearance:auto;}
  label.field-label{display:block; font-size:12.5px; color:var(--slate); margin:0 0 6px; font-weight:600;}
 
  .breadcrumb{display:inline-block; font-size:11.5px; font-weight:700; color:var(--brand2);
    background:#E9F0FC; border-radius:20px; padding:3px 11px; margin-bottom:8px;}
  .manual-head{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .manual-head h2{font-size:19px; margin:0 0 2px;}
  .manual-sub{color:var(--brand2); font-weight:700; font-size:14px; margin:0 0 14px;}
  .manual-box{background:#fff; border:1px solid var(--line); border-radius:9px; padding:14px;
    font-size:13.5px; color:#3D4756; white-space:pre-wrap; margin-bottom:6px;}
  .edit-btn{border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:8px;
    padding:6px 12px; font-size:12.5px; cursor:pointer; white-space:nowrap;}
 
  .flow-box{background:var(--flowbg); border:1px solid #F0DFA8; border-radius:9px; padding:6px 14px;}
  .flow-step{display:flex; align-items:center; gap:10px; padding:9px 0; font-size:13.5px;}
  .flow-step:not(:last-child){border-bottom:1px solid #F0E2B0;}
  .flow-num{flex:none; width:22px; height:22px; border-radius:50%; background:var(--flownum); color:#fff;
    font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center;}
 
  .status-chip-select{display:flex; gap:8px; margin-bottom:2px;}
 
  .log-item{border-bottom:1px solid var(--line); padding:12px 0;}
  .log-item:last-child{border-bottom:none;}
  .log-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;}
  .log-name{font-weight:600; font-size:14.5px;}
  .chip{font-size:11.5px; font-weight:700; padding:3px 9px; border-radius:20px;}
  .chip.양호{background:#E8F6EE; color:var(--ok);}
  .chip.보통{background:#FFF6E4; color:#8A6200;}
  .chip.불량{background:#FBEAE8; color:var(--bad);}
  .chip.정상{background:#E8F6EE; color:var(--ok);}
  .chip.임박{background:#FFF6E4; color:#8A6200;}
  .chip.기한초과{background:#FBEAE8; color:var(--bad);}
  .chip.미점검{background:#F0F1F3; color:var(--slate);}
  .chip.미설정{background:#F0F1F3; color:var(--slate);}
  .card p .chip{margin-left:6px; vertical-align:middle;}
 
  .cycle-row{display:flex; gap:8px;}
  .cycle-row select{flex:1;}
  .cycle-row input{flex:1;}
 
  .summary-row{display:flex; gap:8px; margin-bottom:16px;}
  .summary-pill{flex:1; border-radius:9px; padding:10px 6px; text-align:center; font-size:12px; font-weight:700; background:#F0F1F3; color:var(--slate);}
  .summary-pill.bad{background:#FBEAE8; color:var(--bad);}
  .summary-pill.warn{background:#FFF6E4; color:#8A6200;}
  .summary-pill .num{display:block; font-size:19px; margin-bottom:2px;}
  .log-meta{font-size:11.5px; color:var(--slate); font-family:monospace; margin-bottom:4px;}
  .log-content{font-size:13.5px; color:#3D4756;}
 
  .empty{text-align:center; color:var(--slate); font-size:13.5px; padding:26px 10px;}
  .banner{background:#E9F0FC; border:1px solid #CBDCEC; color:#1D4E89; font-size:12.5px;
    border-radius:8px; padding:10px 12px; margin-bottom:14px;}
 
  nav.bottom{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:480px; background:#fff; display:flex;
    border-top:1px solid var(--line); z-index:5;
  }
  nav.bottom button{
    flex:1; background:none; border:none; color:var(--slate); padding:10px 4px;
    font-size:11.5px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px;
  }
  nav.bottom button.active{color:var(--brand2); font-weight:700;}
  nav.bottom button .ic{font-size:19px;}
 
  .modal-bg{position:fixed; inset:0; background:rgba(20,25,35,.5); z-index:20;
    display:flex; align-items:flex-end; justify-content:center;}
  .modal{background:#fff; width:100%; max-width:480px; border-radius:16px 16px 0 0;
    padding:22px 20px 26px; max-height:82vh; overflow-y:auto;}
  .modal h3{margin:0 0 16px;}
  .modal-actions{display:flex; gap:10px; margin-top:6px;}
  .modal-actions button{flex:1; padding:12px; border-radius:8px; border:none; font-weight:600; cursor:pointer;}
  .modal-actions .cancel{background:#EEECE6; color:var(--ink);}
  .modal-actions .confirm{background:var(--brand2); color:#fff;}
 
  .scan-box{position:fixed; inset:0; background:#000; z-index:30; display:flex; flex-direction:column;}
  .scan-box video{flex:1; object-fit:cover; width:100%;}
  .scan-frame{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:230px; height:230px; border:3px solid var(--warn); border-radius:12px; pointer-events:none;}
  .scan-top{position:absolute; top:0; left:0; right:0; padding:16px; display:flex; justify-content:flex-end;}
  .scan-top button{background:rgba(255,255,255,.15); color:#fff; border:none; border-radius:20px; padding:8px 16px; font-size:13px;}
  .scan-msg{position:absolute; bottom:26px; left:0; right:0; text-align:center; color:#fff; font-size:13.5px; padding:0 20px;}
  .scan-fallback{padding:20px; background:#fff; border-radius:14px; margin:16px; text-align:left;}
 
  .qr-wrap{background:#fff; border:1px solid var(--line); border-radius:10px;
    padding:20px; display:flex; flex-direction:column; align-items:center; margin-bottom:14px;}
  .qr-wrap .code{font-family:monospace; font-size:11px; color:var(--slate); margin-top:10px; word-break:break-all; text-align:center;}
 
  .qr-mini-btn{flex:none; border:1px solid var(--line); background:#F7F8FA; color:var(--brand2);
    border-radius:7px; padding:6px 10px; font-size:12px; font-weight:700; cursor:pointer;}
 
  .photo-input-btn{display:block; width:100%; padding:12px; border:1px dashed var(--line); border-radius:8px;
    background:#F7F8FA; color:var(--slate); font-size:13.5px; text-align:center; cursor:pointer; margin-bottom:10px;}
  .photo-preview-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;}
  .photo-thumb{position:relative; width:72px; height:72px; border-radius:8px; overflow:hidden; border:1px solid var(--line);}
  .photo-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .photo-thumb .rm{position:absolute; top:2px; right:2px; background:rgba(0,0,0,.55); color:#fff; border:none;
    border-radius:50%; width:18px; height:18px; font-size:11px; line-height:1; cursor:pointer;}
  .log-photos{display:flex; gap:6px; flex-wrap:wrap; margin-top:6px;}
  .log-photos img{width:60px; height:60px; object-fit:cover; border-radius:6px; border:1px solid var(--line); cursor:pointer;}
 
  .escalate-box{background:#FBEAE8; border:1px solid #F2C7C2; border-radius:10px; padding:14px; margin-bottom:14px;}
  .escalate-box .esc-title{font-weight:700; color:var(--bad); font-size:14px; margin-bottom:4px;}
  .escalate-box p{color:#7A2A24; font-size:12.5px; margin:0 0 12px;}
  .esc-actions{display:flex; gap:8px;}
  .esc-actions a, .esc-actions button{flex:1; text-align:center; text-decoration:none; padding:10px; border-radius:8px;
    font-size:13px; font-weight:700; border:none; cursor:pointer;}
  .esc-actions .esc-sms{background:var(--bad); color:#fff;}
  .esc-actions .esc-mail{background:#fff; color:var(--bad); border:1px solid var(--bad) !important;}
 
  .dash-list-item{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--line); font-size:13.5px;}
  .dash-list-item:last-child{border-bottom:none;}
  .dash-list-item .name{font-weight:600;}
  .dash-list-item .sub{color:var(--slate); font-size:12px;}

  .warn-banner{background:#FFF6E4; border:1px solid #F0DFA8; color:#8A6200; font-size:12.5px;
    border-radius:8px; padding:10px 12px; margin-bottom:14px;}
</style>
</head>
<body>
<div id="app"></div>
 
<script>
/* ---------------- 상태 ---------------- */
const state = {
  screen: 'home',        // home | workspace
  bizId: null,
  workspaceTab: 'qr',     // qr | manual | log
  selectedItemId: null,
  selectedChecklistId: null,
  businesses: [],
  itemsCache: {},
  logsCache: {},
  appSettings: {},
  cloudReady: false,      // Firebase 연결 성공 여부
  user: null              // 로그인한 관리자 (Firebase Auth User) 또는 null
};

/* ---------------- 클라우드(Firebase) 연결 설정 ----------------
   아래 값을 Firebase 콘솔(https://console.firebase.google.com)에서 만든
   프로젝트의 '웹 앱 설정' 값으로 채운 뒤 이 파일을 다시 호스팅에 올리세요.
   이 값들은 공개되어도 안전합니다 (보안은 Firestore 규칙으로 처리). */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCY6K24w-ZdqBTcqaZUdUZo7foboZ6a2vo",
  authDomain: "smart-toms.firebaseapp.com",
  projectId: "smart-toms",
  storageBucket: "smart-toms.firebasestorage.app",
  messagingSenderId: "734717682542",
  appId: "1:734717682542:web:5e0eea393dbd83789dd77f"
};

let db = null;
function initFirebase(){
  if(!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') return false;
  try{
    if(!firebase.apps.length){ firebase.initializeApp(FIREBASE_CONFIG); }
    db = firebase.firestore();
    return true;
  }catch(e){ return false; }
}
 
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function esc(s){ const d=document.createElement('div'); d.innerText = s ?? ''; return d.innerHTML; }
// 붙여넣기 등으로 텍스트에 실제 줄바꿈 대신 <br> 태그가 섞여 들어온 경우, 진짜 줄바꿈으로 정규화한다.
function normalizeBreaks(s){
  return (s ?? '').replace(/<br\s*\/?>/gi, String.fromCharCode(10));
}
function fmt(ts){ const d = new Date(ts); return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function fmtDate(ts){ const d = new Date(ts); return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0'); }
 
const DAY_MS = 24*60*60*1000;
const SOON_WINDOW_DAYS = 3; // 마감 며칠 전부터 '임박'으로 표시할지
 
// itemId: 설비 id, checklist: {id, name, cycleDays}, logs: 해당 사업체의 전체 점검일지 배열
function inspectionStatus(itemId, checklist, logs){
  if(!checklist.cycleDays){ return { state:'미설정' }; }
  const relevantLogs = (logs||[]).filter(l=>l.itemId===itemId && (l.checklistId===checklist.id || (!l.checklistId && checklist.id==='legacy')));
  if(!relevantLogs.length){ return { state:'미점검', lastTs:null, dueTs:null, daysLeft:null }; }
  const lastTs = Math.max(...relevantLogs.map(l=>l.ts));
  const dueTs = lastTs + checklist.cycleDays*DAY_MS;
  const daysLeft = Math.ceil((dueTs - Date.now())/DAY_MS);
  let st;
  if(dueTs < Date.now()) st = '기한초과';
  else if(daysLeft <= SOON_WINDOW_DAYS) st = '임박';
  else st = '정상';
  return { state:st, lastTs, dueTs, daysLeft };
}

// 같은 설비에 여러 점검 주기를 등록할 수 있도록, 설비마다 checklists 배열을 보장한다.
// 예전 방식(설비 하나 = 주기 하나)으로 저장된 항목은 자동으로 체크리스트 1개로 변환한다.
function ensureChecklists(item){
  if(!item.checklists || !item.checklists.length){
    item.checklists = [{ id:'legacy', name:'정기 점검', cycleDays: item.cycleDays || null }];
  }
  return item.checklists;
}
 
function cycleLabel(days){
  const presets = {1:'매일', 7:'주간', 14:'격주', 30:'월간', 90:'분기', 180:'반기', 365:'연간'};
  if(!days) return '주기 미설정';
  return presets[days] ? presets[days] : days+'일마다';
}

function isAdmin(){ return !state.cloudReady || (!!state.user && !state.user.isAnonymous); }

// 로그인 없이도 점검일지 작성 등 최소한의 쓰기 권한이 필요한 현장 작업자를 위해,
// 관리자 로그인 상태가 아니면 자동으로 '익명 인증' 세션을 만든다.
// (Firestore 규칙에서 request.auth != null 조건을 만족시키되, isAdmin()에서는 관리자로 취급하지 않는다)
async function ensureAnonymousAuth(){
  if(!state.cloudReady) return;
  if(firebase.auth().currentUser) return;
  try{ await firebase.auth().signInAnonymously(); }
  catch(e){ console.error('익명 인증 실패', e); }
}
 
/* ---------------- 저장소 (클라우드 연결 시 Firestore, 아니면 기기별 localStorage) ---------------- */
async function loadBusinesses(){
  if(state.cloudReady){
    try{
      const snap = await db.collection('businesses').get();
      state.businesses = snap.docs.map(d=>Object.assign({id:d.id}, d.data()));
    }catch(e){ state.businesses = []; showToast('사업체 목록을 불러오지 못했습니다: ' + (e && e.message ? e.message : e)); }
  }else{
    try{ const v = localStorage.getItem('businesses'); state.businesses = v ? JSON.parse(v) : []; }
    catch(e){ state.businesses = []; }
  }
}
async function upsertBusiness(biz){
  if(state.cloudReady){
    const { id, ...data } = biz;
    await db.collection('businesses').doc(id).set(data);
  }else{
    localStorage.setItem('businesses', JSON.stringify(state.businesses));
  }
}
async function deleteBusinessCascade(bizId){
  if(state.cloudReady){
    const itemsSnap = await db.collection('businesses').doc(bizId).collection('items').get();
    await Promise.all(itemsSnap.docs.map(d=>d.ref.delete()));
    const logsSnap = await db.collection('businesses').doc(bizId).collection('logs').get();
    await Promise.all(logsSnap.docs.map(d=>d.ref.delete()));
    await db.collection('businesses').doc(bizId).delete();
  }else{
    localStorage.removeItem('items:'+bizId);
    localStorage.removeItem('logs:'+bizId);
    localStorage.setItem('businesses', JSON.stringify(state.businesses));
  }
}
 
async function loadItems(bizId){
  if(state.cloudReady){
    try{
      const snap = await db.collection('businesses').doc(bizId).collection('items').get();
      state.itemsCache[bizId] = snap.docs.map(d=>Object.assign({id:d.id}, d.data()));
    }catch(e){ state.itemsCache[bizId] = []; showToast('설비 목록을 불러오지 못했습니다: ' + (e && e.message ? e.message : e)); }
  }else{
    try{ const v = localStorage.getItem('items:'+bizId); state.itemsCache[bizId] = v ? JSON.parse(v) : []; }
    catch(e){ state.itemsCache[bizId] = []; }
  }
  return state.itemsCache[bizId];
}
async function upsertItem(bizId, item){
  if(state.cloudReady){
    const { id, ...data } = item;
    await db.collection('businesses').doc(bizId).collection('items').doc(id).set(data);
  }else{
    localStorage.setItem('items:'+bizId, JSON.stringify(state.itemsCache[bizId]||[]));
  }
}
async function deleteItemCascade(bizId, itemId){
  if(state.cloudReady){
    const logsSnap = await db.collection('businesses').doc(bizId).collection('logs').where('itemId','==',itemId).get();
    await Promise.all(logsSnap.docs.map(d=>d.ref.delete()));
    await db.collection('businesses').doc(bizId).collection('items').doc(itemId).delete();
  }else{
    localStorage.setItem('items:'+bizId, JSON.stringify(state.itemsCache[bizId]||[]));
    localStorage.setItem('logs:'+bizId, JSON.stringify(state.logsCache[bizId]||[]));
  }
}
 
async function loadLogs(bizId){
  if(state.cloudReady){
    try{
      const snap = await db.collection('businesses').doc(bizId).collection('logs').get();
      state.logsCache[bizId] = snap.docs.map(d=>Object.assign({id:d.id}, d.data()));
    }catch(e){ state.logsCache[bizId] = []; showToast('점검 이력을 불러오지 못했습니다: ' + (e && e.message ? e.message : e)); }
  }else{
    try{ const v = localStorage.getItem('logs:'+bizId); state.logsCache[bizId] = v ? JSON.parse(v) : []; }
    catch(e){ state.logsCache[bizId] = []; }
  }
  return state.logsCache[bizId];
}
async function addLog(bizId, logEntry){
  if(state.cloudReady){
    const { id, ...data } = logEntry;
    await db.collection('businesses').doc(bizId).collection('logs').doc(id).set(data);
  }else{
    localStorage.setItem('logs:'+bizId, JSON.stringify(state.logsCache[bizId]||[]));
  }
}
async function deleteLog(bizId, logId){
  if(state.cloudReady){
    await db.collection('businesses').doc(bizId).collection('logs').doc(logId).delete();
  }else{
    localStorage.setItem('logs:'+bizId, JSON.stringify(state.logsCache[bizId]||[]));
  }
}

/* ---------------- 브라우저 기본 alert()/confirm() 대체 ----------------
   일부 실행 환경(샌드박스 iframe)에서는 window.alert/confirm이 차단되어
   아무 반응 없이 무시될 수 있어, 앱 내부에서 직접 그리는 확인창/토스트를 사용한다. */
function showToast(message){
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed; left:50%; bottom:100px; transform:translateX(-50%); background:#1B2430; color:#fff; padding:11px 18px; border-radius:9px; font-size:13px; z-index:60; max-width:88%; text-align:center; box-shadow:0 6px 18px rgba(0,0,0,.28);';
  t.textContent = message;
  document.body.appendChild(t);
  setTimeout(()=>{ t.remove(); }, 3200);
}
function customConfirm(message, confirmLabel){
  return new Promise((resolve)=>{
    const bg = document.createElement('div');
    bg.className = 'modal-bg';
    bg.style.zIndex = '40';
    bg.innerHTML = `
      <div class="modal">
        <h3>확인</h3>
        <p style="color:var(--ink); font-size:14px; white-space:pre-wrap; margin:0 0 18px;">${esc(message)}</p>
        <div class="modal-actions">
          <button class="cancel" id="cfCancel">취소</button>
          <button class="confirm" id="cfOk" style="background:var(--bad);">${esc(confirmLabel || '삭제')}</button>
        </div>
      </div>`;
    document.body.appendChild(bg);
    bg.querySelector('#cfCancel').onclick = ()=>{ bg.remove(); resolve(false); };
    bg.querySelector('#cfOk').onclick = ()=>{ bg.remove(); resolve(true); };
  });
}

/* ---------------- 전체 데이터 백업 / 가져오기 ---------------- */
function exportAllData(){
  const data = { appSettings: state.appSettings, businesses: state.businesses, items: {}, logs: {} };
  state.businesses.forEach(b=>{
    try{ data.items[b.id] = JSON.parse(localStorage.getItem('items:'+b.id) || '[]'); }catch(e){ data.items[b.id] = []; }
    try{ data.logs[b.id] = JSON.parse(localStorage.getItem('logs:'+b.id) || '[]'); }catch(e){ data.logs[b.id] = []; }
  });
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '시설물관리_백업_' + fmtDate(Date.now()).replace(/\./g,'') + '.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
async function importAllData(file){
  try{
    const text = await file.text();
    const data = JSON.parse(text);
    if(!(await customConfirm('백업 파일을 가져오면 기존 데이터에 사업체가 추가/병합됩니다. 계속하시겠습니까?'))) return;
    if(data.appSettings){ state.appSettings = Object.assign({}, state.appSettings, data.appSettings); await saveAppSettings(); }
    const existingIds = new Set(state.businesses.map(b=>b.id));
    const newBusinesses = (data.businesses||[]).filter(b=>!existingIds.has(b.id));
    for(const b of newBusinesses){
      state.businesses.push(b);
      await upsertBusiness(b);
    }
    for(const bizId of Object.keys(data.items||{})){
      const items = data.items[bizId] || [];
      state.itemsCache[bizId] = items;
      for(const it of items){ await upsertItem(bizId, it); }
    }
    for(const bizId of Object.keys(data.logs||{})){
      const logs = data.logs[bizId] || [];
      state.logsCache[bizId] = logs;
      for(const lg of logs){ await addLog(bizId, lg); }
    }
    showToast('가져오기가 완료되었습니다.');
    render();
  }catch(e){
    showToast('백업 파일을 읽을 수 없습니다: ' + (e && e.message ? e.message : e));
  }
}

  }
  bg.querySelector('#mSave').onclick = async ()=>{

/* ---- 탭1: QR/설비 ---- */
function tabQr(){
  const items = state.itemsCache[state.bizId] || [];
  const logs = state.logsCache[state.bizId] || [];

  let overdueCount = 0, soonCount = 0;
  const rows = items.map(it=>{
    const checklists = ensureChecklists(it);
    const statuses = checklists.map(cl=>inspectionStatus(it.id, cl, logs));
    const od = statuses.filter(s=>s.state==='기한초과' || s.state==='미점검').length;
    const sn = statuses.filter(s=>s.state==='임박').length;
    overdueCount += od; soonCount += sn;
    return { item: it, checklists, od, sn };
  });

  const summaryHtml = items.length ? `
    <div class="summary-row">
      <div class="summary-pill bad"><span class="num">${overdueCount}</span>기한초과·미점검 체크리스트</div>
      <div class="summary-pill warn"><span class="num">${soonCount}</span>점검 임박 체크리스트(${SOON_WINDOW_DAYS}일 이내)</div>
    </div>` : '';
 
  const list = rows.map(r=>{
    const hasCycle = r.checklists.some(cl=>cl.cycleDays);
    let stChip = '';
    if(r.od > 0) stChip = `<span class="chip 기한초과">${r.od}건 확인필요</span>`;
    else if(r.sn > 0) stChip = `<span class="chip 임박">${r.sn}건 임박</span>`;
    else if(hasCycle) stChip = `<span class="chip 정상">정상</span>`;
    const sub = `${r.item.location||'위치 미입력'} · 체크리스트 ${r.checklists.length}개`;
    return `
    <div class="card tap" data-item="${r.item.id}">
      <span class="ic">🔧</span>
      <div style="flex:1; min-width:0;">
        <h3>${esc(r.item.name)} ${stChip}</h3>
        <p>${esc(sub)}</p>
      </div>
      <button class="qr-mini-btn" data-qr="${r.item.id}">QR 보기</button>
      <span class="chev">›</span>
    </div>
  `;}).join('') || `<div class="empty">등록된 점검 항목이 없습니다.</div>`;
 
  return `
    <div class="qr-promo">
      <div class="glyph">▦</div>
      <p>현장 설비에 부착된 QR코드를 스캔하세요</p>
      <button class="btn-primary" id="btnScan">📷 QR코드 스캔하기</button>
    </div>
    ${summaryHtml}
    <div class="section-label">수동 시설물 선택</div>
    ${list}
    ${isAdmin() ? `<button class="btn-secondary" id="btnAddItem">+ 점검 항목 추가</button>` : ''}
  `;
}

function fileToCompressedDataUrl(file, maxDim, quality){
  maxDim = maxDim || 900; quality = quality || 0.7;
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h*maxDim/w); w = maxDim; }
        else if(h >= w && h > maxDim){ w = Math.round(w*maxDim/h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = ()=> reject(new Error('이미지를 읽을 수 없습니다.'));
      img.src = reader.result;
    };
    reader.onerror = ()=> reject(new Error('파일을 읽을 수 없습니다.'));
    reader.readAsDataURL(file);
  });
}

function tabDash(){
  const items = state.itemsCache[state.bizId] || [];

  const rows = [];
  items.forEach(it=>{
    ensureChecklists(it).forEach(cl=>{

    });
  });
  const overdue = rows.filter(x=>x.st.state==='기한초과' || x.st.state==='미점검');
  const soon = rows.filter(x=>x.st.state==='임박');
  const normal = rows.filter(x=>x.st.state==='정상');
  const noCycle = rows.filter(x=>x.st.state==='미설정');
 
  const listHtml = (arr)=> arr.length ? arr.map(x=>{
    let sub = (x.item.location||'위치 미입력') + ' · ' + x.checklist.name;
    if(x.st.dueTs) sub += ' · 다음 점검 ' + fmtDate(x.st.dueTs);
    else if(x.st.lastTs) sub += ' · 최근 점검 ' + fmtDate(x.st.lastTs);
    return `
    <div class="dash-list-item">
      <div><div class="name">${esc(x.item.name)}</div><div class="sub">${esc(sub)}</div></div>
      <span class="chip ${x.st.state}">${x.st.state}</span>
    </div>
  `;}).join('') : `<div class="empty">해당 항목이 없습니다.</div>`;
 
  // 점검 완료(정상) 항목은 점검 주기가 다르면 한데 묶었을 때 헷갈리므로,
  // 매일/주간/월간 등 주기별로 나눠서 보여준다.
  const cycleGroups = {};
  normal.forEach(x=>{
    const label = cycleLabel(x.checklist.cycleDays);
    if(!cycleGroups[label]) cycleGroups[label] = [];
    cycleGroups[label].push(x);
  });
  const cycleOrder = ['매일','주간','격주','월간','분기','반기','연간'];
  const groupKeys = Object.keys(cycleGroups).sort((a,b)=>{
    const ia = cycleOrder.indexOf(a), ib = cycleOrder.indexOf(b);
    if(ia===-1 && ib===-1) return a.localeCompare(b);
    if(ia===-1) return 1;
    if(ib===-1) return -1;
    return ia-ib;
  });
  const normalHtml = groupKeys.length
    ? groupKeys.map(label=>`

  return `

    <button class="btn-secondary" id="btnPrintReport">🖨 인쇄용 보고서 보기 / PDF저장</button>
  `;

function exportCsv(){
  const biz = state.businesses.find(b=>b.id===state.bizId);
  const items = state.itemsCache[state.bizId] || [];
  const logs = state.logsCache[state.bizId] || [];
  const rows = [['사업체','설비명','체크리스트','위치','점검주기','점검일시','점검자','소속/직책','상태','내용']];
  logs.slice().sort((a,b)=>a.ts-b.ts).forEach(l=>{
    const item = items.find(i=>i.id===l.itemId);
    const checklists = item ? ensureChecklists(item) : [];
    const cl = checklists.find(c=>c.id===l.checklistId) || (l.checklistId ? null : checklists.find(c=>c.id==='legacy')) || null;
    rows.push([
      biz ? biz.name : '', item ? item.name : l.itemName, cl ? cl.name : '', item ? (item.location||'') : '',
      cl ? cycleLabel(cl.cycleDays) : '', fmt(l.ts), l.inspector, l.department||'', l.status, (l.content||'').replace(/\n/g,' ')
    ]);
  });
  const csv = rows.map(r => r.map(cell=>{
    const s = String(cell==null ? '' : cell);
    return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = (biz ? biz.name : '점검이력') + '_점검일지.csv';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

async function submitLog(){

/* ---------------- QR 스캔 ---------------- */
async function openScanner(){
  const box = document.createElement('div');
  box.className = 'scan-box';
  box.innerHTML = `
    <video autoplay playsinline muted></video>
    <div class="scan-frame"></div>
    <div class="scan-top"><button id="scanClose">닫기</button></div>
    <div class="scan-msg" id="scanMsg">QR을 사각형 안에 맞춰주세요</div>
  `;
  document.body.appendChild(box);
  const video = box.querySelector('video');
  const closeBtn = box.querySelector('#scanClose');
  let stream = null, raf = null, stopped = false;
 
  function stop(){
    stopped = true;
    if(raf) cancelAnimationFrame(raf);
    if(stream) stream.getTracks().forEach(t=>t.stop());
    box.remove();
  }
  closeBtn.onclick = stop;
 
  try{
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = stream;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const tick = ()=>{
      if(stopped) return;
      if(video.readyState === video.HAVE_ENOUGH_DATA){
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imgData = ctx.getImageData(0,0,canvas.width, canvas.height);
        const result = jsQR(imgData.data, imgData.width, imgData.height);
        if(result){ handleScanResult(result.data); stop(); return; }
      }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
  }catch(e){
    box.querySelector('#scanMsg').textContent = '카메라를 사용할 수 없습니다.';
    showManualFallback(box);
  }
}
 
function showManualFallback(box){
  const wrap = document.createElement('div');
  wrap.className = 'scan-fallback';
  wrap.innerHTML = `
    <label class="field-label">QR 코드 값을 직접 입력하세요</label>
    <input type="text" id="manualCode" placeholder="SFM:사업체ID:항목ID">
    <button class="btn-primary" id="manualGo">이동</button>
  `;
  box.appendChild(wrap);
  wrap.querySelector('#manualGo').onclick = ()=>{
    const v = wrap.querySelector('#manualCode').value.trim();
    handleScanResult(v);
    box.remove();
  };
}
 
function parseScannedValue(raw){
  const value = (raw||'').trim();
  // 1) 새 형식: URL (?biz=xxx&item=yyy)
  try{
    const u = new URL(value, location.href);
    const bizId = u.searchParams.get('biz');
    const itemId = u.searchParams.get('item');
    if(bizId && itemId) return {bizId, itemId};
  }catch(e){ /* URL 형식이 아니면 무시하고 아래로 */ }
  // 2) 구 형식 호환: SFM:사업체ID:항목ID
  const parts = value.split(':');
  if(parts.length === 3 && parts[0] === 'SFM') return {bizId: parts[1], itemId: parts[2]};
  return null;
}
 
async function handleScanResult(code){
  const parsed = parseScannedValue(code);
  if(!parsed){ showToast('등록되지 않은 QR입니다.'); return; }
  const { bizId, itemId } = parsed;
  if(bizId !== state.bizId){ showToast('현재 사업체의 QR이 아닙니다.'); return; }
  const item = (state.itemsCache[state.bizId]||[]).find(i=>i.id===itemId);
  if(!item){ showToast('등록되지 않은 점검 항목입니다.'); return; }
  state.selectedItemId = itemId;
  state.workspaceTab = 'manual';
  render();
}
 
/* ---------------- 시작 ---------------- */
(async function init(){
  app.innerHTML = `<div style="padding:40px;text-align:center;color:#748092;">불러오는 중…</div>`;
  await loadAppSettings();
  state.cloudReady = initFirebase();

  if(state.cloudReady){
    firebase.auth().onAuthStateChanged((u)=>{
      state.user = u;
      render();
    });
    ensureAnonymousAuth();
  }

  await loadBusinesses();
 
  // QR을 일반 카메라 앱으로 스캔해 URL로 바로 들어온 경우 처리
  const params = new URLSearchParams(location.search);
  const bizId = params.get('biz');
  const itemId = params.get('item');
  if(bizId && itemId && state.businesses.find(b=>b.id===bizId)){
    state.bizId = bizId;
    await loadItems(bizId);
    await loadLogs(bizId);
    const item = (state.itemsCache[bizId]||[]).find(i=>i.id===itemId);
    state.selectedItemId = item ? itemId : null;
    state.workspaceTab = item ? 'manual' : 'qr';
    state.screen = 'workspace';
  }
 
  render();
})();
</script>
</body>
</html>
